services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: infonih-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: infonih
      POSTGRES_PASSWORD: infonih
      POSTGRES_DB: infonih
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - infonih-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infonih -d infonih"]
      interval: 5s
      timeout: 3s
      retries: 10

  scheduler:
    build: .
    container_name: infonih-scheduler
    command: python -m infonih.scripts.run_scheduler
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build: .
    container_name: infonih-bot
    command: python -m infonih.scripts.run_telegram_bot
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Run on demand: `docker compose --profile migrate run --rm migrate`
  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: ["migrate"]

volumes:
  infonih-pgdata:
